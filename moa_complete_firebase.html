<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وزارة الزراعة — الأردن | قاعدة البيانات الكاملة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e13;--surface:#111720;--surface2:#1a2130;
    --border:#1f2d3d;--border2:#2a3f55;
    --accent:#00d97e;--accent2:#4dabf7;--accent3:#ff8c42;--accent4:#c084fc;
    --text:#dde6f0;--text-muted:#7a92a8;--text-dim:#3a5068;
    --red:#ff6b6b;
    --font:'Tajawal',sans-serif;--mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

  /* TOPBAR */
  .topbar{
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:200;gap:16px;
  }
  .brand{display:flex;align-items:center;gap:12px}
  .brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 10px var(--accent);animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .brand h1{font-size:14px;font-weight:700}
  .brand small{font-size:11px;color:var(--text-muted);font-weight:300}
  .topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .pill{
    font-family:var(--mono);font-size:11px;padding:4px 12px;
    border-radius:20px;border:1px solid var(--border2);
    background:var(--surface2);color:var(--accent);white-space:nowrap;
  }
  .btn-fire{
    display:flex;align-items:center;gap:6px;padding:8px 16px;
    background:#ff6d2e;color:#fff;border:none;border-radius:7px;
    font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;
    transition:opacity .2s;white-space:nowrap;
  }
  .btn-fire:hover{opacity:.88}

  /* LAYOUT */
  .layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 57px)}

  /* SIDEBAR */
  .sidebar{
    background:var(--surface);border-left:1px solid var(--border);
    padding:20px 14px;position:sticky;top:57px;
    height:calc(100vh - 57px);overflow-y:auto;
  }
  .sb-section{margin-bottom:24px}
  .sb-label{
    font-size:9px;font-weight:700;letter-spacing:.14em;
    color:var(--text-dim);text-transform:uppercase;
    margin-bottom:8px;padding:0 6px;
  }
  .sb-btn{
    display:flex;align-items:center;justify-content:space-between;
    width:100%;padding:7px 8px;background:none;border:none;
    border-radius:6px;color:var(--text-muted);font-family:var(--font);
    font-size:12.5px;cursor:pointer;text-align:right;
    transition:background .15s,color .15s;margin-bottom:2px;
  }
  .sb-btn:hover,.sb-btn.active{background:var(--surface2);color:var(--text)}
  .sb-btn.active{color:var(--accent)}
  .sb-count{
    font-family:var(--mono);font-size:10px;background:var(--surface2);
    border-radius:10px;padding:1px 7px;color:var(--text-dim);flex-shrink:0;
  }
  .sb-stat{font-size:11px;color:var(--text-muted);line-height:1.8;padding:0 6px}
  .sb-stat code{color:var(--accent2);font-family:var(--mono);font-size:10px}

  /* MAIN */
  .main{padding:24px 28px;overflow:hidden}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .search-wrap{position:relative;flex:1;min-width:200px;max-width:400px}
  .search-wrap input{
    width:100%;background:var(--surface);border:1px solid var(--border);
    border-radius:8px;padding:9px 14px 9px 36px;color:var(--text);
    font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s;
  }
  .search-wrap input:focus{border-color:var(--accent2)}
  .search-wrap input::placeholder{color:var(--text-dim)}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);
    color:var(--text-dim);pointer-events:none;font-size:14px}

  .type-tabs{display:flex;gap:4px}
  .tab{
    padding:7px 13px;border-radius:6px;border:1px solid var(--border);
    background:none;color:var(--text-muted);font-family:var(--font);font-size:12px;
    cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .tab:hover,.tab.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}
  .tab.active{color:var(--accent2)}

  /* SECTION DIVIDERS */
  .section-title{
    font-size:11px;font-weight:700;color:var(--text-dim);
    letter-spacing:.08em;text-transform:uppercase;
    padding:8px 0 10px;margin-top:6px;
    display:flex;align-items:center;gap:10px;
  }
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}

  /* GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:9px;
    padding:16px;transition:border-color .2s,transform .15s;
    animation:fadeUp .25s ease both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .card:hover{border-color:var(--accent2);transform:translateY(-1px)}
  .card-head{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
  .file-badge{
    width:34px;height:34px;border-radius:7px;display:flex;
    align-items:center;justify-content:center;font-size:10px;
    font-weight:700;flex-shrink:0;font-family:var(--mono);letter-spacing:.02em;
  }
  .badge-pdf{background:#2d1212;color:#ff6b6b;border:1px solid #3d1a1a}
  .badge-xlsx{background:#0f2a18;color:#4ade80;border:1px solid #163822}
  .badge-xls{background:#0f2a18;color:#86efac;border:1px solid #163822}
  .badge-link{background:#131e30;color:#60a5fa;border:1px solid #1a2b45}
  .badge-zip{background:#2d2410;color:#fb923c;border:1px solid #3d3015}
  .card-title{font-size:13px;font-weight:500;line-height:1.5;color:var(--text);flex:1}
  .card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px}
  .t-stat{background:#0e2318;color:var(--accent)}
  .t-market{background:#0f1e30;color:#60a5fa}
  .t-trade{background:#1a1230;color:var(--accent4)}
  .t-study{background:#2a1a0a;color:var(--accent3)}
  .t-monthly{background:#1e0e28;color:#e879f9}
  .t-annual{background:#140e26;color:#a78bfa}
  .t-conf{background:#161c10;color:#84cc16;font-size:9px}
  .t-gen{background:#1a1608;color:#ca8a04;font-size:9px}
  .card-year{
    font-family:var(--mono);font-size:11px;color:var(--text-dim);
  }
  .card-url{
    margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
    font-family:var(--mono);font-size:9.5px;color:var(--text-dim);
    word-break:break-all;line-height:1.6;
  }
  .card-url a{color:var(--accent2);text-decoration:none}
  .card-url a:hover{text-decoration:underline}

  /* EMPTY / LOADING */
  .empty{text-align:center;padding:60px;color:var(--text-dim);
    grid-column:1/-1;font-size:14px}

  /* MODAL */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.75);
    display:none;align-items:center;justify-content:center;
    z-index:300;padding:20px;
  }
  .modal-bg.open{display:flex}
  .modal{
    background:var(--surface);border:1px solid var(--border2);
    border-radius:12px;width:100%;max-width:860px;
    max-height:88vh;display:flex;flex-direction:column;
  }
  .modal-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid var(--border);
  }
  .modal-head h3{font-size:13px;font-weight:700;color:var(--text)}
  .modal-acts{display:flex;gap:8px}
  .btn-copy{padding:6px 14px;background:var(--accent);color:#0a0e13;
    border:none;border-radius:6px;font-family:var(--font);font-size:12px;
    font-weight:700;cursor:pointer;transition:opacity .2s}
  .btn-close{padding:6px 14px;background:var(--surface2);color:var(--text);
    border:1px solid var(--border);border-radius:6px;font-family:var(--font);
    font-size:12px;cursor:pointer}
  .modal-body{flex:1;overflow-y:auto}
  .modal-body pre{
    font-family:var(--mono);font-size:11px;line-height:1.7;
    color:var(--text);padding:18px;white-space:pre-wrap;word-break:break-all;
  }

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <h1>وزارة الزراعة — الأردن</h1>
      <small>قاعدة البيانات الكاملة · Firebase / Firestore Ready</small>
    </div>
  </div>
  <div class="topbar-right">
    <span class="pill" id="totalPill">جار التحميل…</span>
    <button class="btn-fire" id="directUploadBtn" style="background:#10b981;">🚀 Upload to Firebase</button>
    <button class="btn-fire" onclick="openModal()">🔥 Firebase Export</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-label">الفئات</div>
      <button class="sb-btn active" data-cat="all" onclick="setFilter('cat','all',this)">
        الكل <span class="sb-count" id="cnt-all">—</span>
      </button>
      <button class="sb-btn" data-cat="stat" onclick="setFilter('cat','stat',this)">
        الزراعة بالأرقام <span class="sb-count" id="cnt-stat">—</span>
      </button>
      <button class="sb-btn" data-cat="market" onclick="setFilter('cat','market',this)">
        أسواق سنوية <span class="sb-count" id="cnt-market">—</span>
      </button>
      <button class="sb-btn" data-cat="trade_annual" onclick="setFilter('cat','trade_annual',this)">
        صادر/مستورد سنوي <span class="sb-count" id="cnt-trade_annual">—</span>
      </button>
      <button class="sb-btn" data-cat="export_monthly" onclick="setFilter('cat','export_monthly',this)">
        صادرات شهرية <span class="sb-count" id="cnt-export_monthly">—</span>
      </button>
      <button class="sb-btn" data-cat="import_monthly" onclick="setFilter('cat','import_monthly',this)">
        مستوردات شهرية <span class="sb-count" id="cnt-import_monthly">—</span>
      </button>
      <button class="sb-btn" data-cat="daily_market" onclick="setFilter('cat','daily_market',this)">
        أسعار يومية <span class="sb-count" id="cnt-daily_market">—</span>
      </button>
      <button class="sb-btn" data-cat="study" onclick="setFilter('cat','study',this)">
        دراسات وأبحاث <span class="sb-count" id="cnt-study">—</span>
      </button>
    </div>
    <div class="sb-section">
      <div class="sb-label">السنة</div>
      <button class="sb-btn" data-year="all" onclick="setFilter('year','all',this)">
        كل السنوات
      </button>
      <div id="yearList"></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">معلومات</div>
      <div class="sb-stat">
        📁 Collection: <code>moa_documents</code><br>
        🗓 آخر تحديث: <code>21/04/2026</code><br>
        ✅ مؤكد: <code id="confirmedCount">—</code><br>
        🔄 من النمط: <code id="generatedCount">—</code>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="ابحث في المستندات…" oninput="render()">
      </div>
      <div class="type-tabs">
        <button class="tab active" data-type="all" onclick="setFilter('type','all',this)">الكل</button>
        <button class="tab" data-type="pdf" onclick="setFilter('type','pdf',this)">PDF</button>
        <button class="tab" data-type="xlsx" onclick="setFilter('type','xlsx',this)">Excel</button>
      </div>
    </div>
    <div id="gridContainer"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h3>🔥 Firebase Firestore — ملف الاستيراد الكامل</h3>
      <div class="modal-acts">
        <button class="btn-copy" onclick="copyCode()">📋 نسخ</button>
        <button class="btn-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="modal-body"><pre id="codeOut"></pre></div>
  </div>
</div>

function getFiltered(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  return docs.filter(d=>{
    if(filterCat!=='all' && d.cat!==filterCat) return false;
    if(filterYear!=='all' && String(d.year)!==String(filterYear)) return false;
    if(filterType!=='all'){
      if(filterType==='xlsx' && !['xlsx','xls'].includes(d.type)) return false;
      if(filterType!=='xlsx' && d.type!==filterType) return false;
    }
    if(q && !d.titleAr.toLowerCase().includes(q) && !d.titleEn.toLowerCase().includes(q)) return false;
    return true;
  });
}

  const m={stat:'t-stat',market:'t-market',trade_annual:'t-trade',
    export_monthly:'t-monthly',import_monthly:'t-annual',
    daily_market:'t-study',study:'t-study'};
  return m[cat]||'t-stat';
}
const monthNames=['','يناير','فبراير','مارس','أبريل','مايو','يونيو',
  'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function render(){
  const filtered = getFiltered();
  document.getElementById('totalPill').textContent = filtered.length+' ملف';
  const cont = document.getElementById('gridContainer');

  if(!filtered.length){
    cont.innerHTML='<div class="grid"><div class="empty">لا توجد نتائج</div></div>';
    return;
  }

  // Group by category
  const cats = {};
  filtered.forEach(d=>{
    if(!cats[d.cat]) cats[d.cat]=[];
    cats[d.cat].push(d);
  });

  const catNames = {
    stat:'الزراعة بالأرقام',market:'التقارير السنوية للأسواق',
    trade_annual:'الصادرات والمستوردات السنوية',export_monthly:'الصادرات الشهرية',
    import_monthly:'المستوردات الشهرية',daily_market:'أسعار السوق اليومية',
    study:'الدراسات والأبحاث'
  };

  let html='';
  Object.entries(cats).forEach(([cat,items])=>{
    const label = catNames[cat]||cat;
    html+=`<div class="section-title">${label} (${items.length})</div>`;
    html+='<div class="grid">';
    items.slice(0,200).forEach((d,i)=>{
      const delay = (i%20)*0.025;
      html+=`<div class="card" style="animation-delay:${delay}s">
        <div class="card-head">
          <div class="file-badge ${badgeClass(d.type)}">${d.type.toUpperCase()}</div>
          <div class="card-title">${d.titleAr}</div>
        </div>
        <div class="card-meta">
          <span class="tag ${tagClass(d.cat)}">${d.catLabel}</span>
          ${d.year?`<span class="card-year">${d.year}</span>`:''}
          ${d.month?`<span class="tag" style="background:#161c26;color:#7a92a8;font-size:9px">${monthNames[d.month]}</span>`:''}
          ${d.sizeKB?`<span class="card-year">${d.sizeKB>=1024?(d.sizeKB/1024).toFixed(1)+' MB':d.sizeKB+' KB'}</span>`:''}
          <span class="tag ${d.conf?'t-conf':'t-gen'}">${d.conf?'✓ مؤكد':'~ نمط'}</span>
        </div>
        <div class="card-url"><a href="${d.url}" target="_blank" rel="noopener">${d.url}</a></div>
      </div>`;
    });
    if(items.length>200) html+=`<div class="card" style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text-dim)">… و${items.length-200} ملف إضافي في نفس الفئة</div>`;
    html+='</div>';
  });
  cont.innerHTML=html;
}

function setFilter(kind, val, btn){
  if(kind==='cat'){
    filterCat=val;
    document.querySelectorAll('[data-cat]').forEach(b=>b.classList.remove('active'));
  } else if(kind==='year'){
    filterYear=val;
    document.querySelectorAll('[data-year]').forEach(b=>b.classList.remove('active'));
  } else if(kind==='type'){
    filterType=val;
    document.querySelectorAll('[data-type]').forEach(b=>b.classList.remove('active'));
  }
  btn.classList.add('active');
  render();
}

function buildSidebar(){
  // Counts
  ['stat','market','trade_annual','export_monthly','import_monthly','daily_market','study'].forEach(c=>{
    const el=document.getElementById('cnt-'+c);
    if(el) el.textContent=docs.filter(d=>d.cat===c).length;
  });
  document.getElementById('cnt-all').textContent=docs.length;
  document.getElementById('confirmedCount').textContent=docs.filter(d=>d.conf).length;
  document.getElementById('generatedCount').textContent=docs.filter(d=>!d.conf).length;

  // Year list
  const years=[...new Set(docs.filter(d=>d.year).map(d=>d.year))].sort((a,b)=>b-a);
  const yl=document.getElementById('yearList');
  yl.innerHTML=years.map(y=>`
    <button class="sb-btn" data-year="${y}" onclick="setFilter('year','${y}',this)">
      ${y} <span class="sb-count">${docs.filter(d=>d.year===y).length}</span>
    </button>`).join('');
}

// ── All ${docs.length} Documents
export const moaDocuments = ${JSON.stringify(docs, null, 2)};

// ── Firestore Batch Seed (writes ~500 docs per batch)
export async function seedMoaDocuments() {
  const colRef = collection(db, "moa_documents");
  const BATCH_SIZE = 490;
  let batch = writeBatch(db);
  let count = 0;

  for (const docData of moaDocuments) {
    const ref = doc(colRef, docData.id);
    batch.set(ref, {
      ...docData,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    });
    count++;
    if (count % BATCH_SIZE === 0) {
      await batch.commit();
      batch = writeBatch(db);
      console.log(\`Batch committed: \${count} / \${moaDocuments.length}\`);
    }
  }
  if (count % BATCH_SIZE !== 0) await batch.commit();
  console.log(\`✅ Done: \${moaDocuments.length} documents seeded.\`);
}
